services:
  - type: web
    name: webcam-faceauth
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: ./db/faceid.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        value: libsql://faceauth-db-maneshwars.aws-ap-south-1.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false
